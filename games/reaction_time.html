<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1116; color: #e8e8e8; margin: 0; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  button {
    font-size: 16px; padding: 10px 20px; margin: 8px; border-radius: 8px;
    border: none; cursor: pointer; background: #4f8cff; color: white; font-weight: 600;
  }
  button:hover { background: #3d75e0; }
  #instructions { max-width: 500px; text-align: center; color: #ccc; font-size: 14px; line-height: 1.5; }
  #stage {
    width: 320px; height: 320px; border-radius: 16px; display: flex;
    align-items: center; justify-content: center; font-size: 22px; font-weight: 600;
    margin: 20px 0; cursor: pointer; user-select: none; text-align: center; padding: 20px;
  }
  #stage.waiting { background: #eb5757; }
  #stage.ready { background: #6fcf97; }
  #stage.idle { background: #1c1f2a; border: 3px solid #333; }
  #progress { font-size: 14px; color: #999; margin-bottom: 6px; }
  #results { text-align: center; }
  .metric { display: inline-block; margin: 10px 16px; }
  .metric-value { font-size: 28px; font-weight: bold; color: #4f8cff; }
  .metric-label { font-size: 13px; color: #999; }
  #copy-box {
    background: #1c1f2a; padding: 12px; border-radius: 8px; margin-top: 16px;
    font-family: monospace; font-size: 13px; word-break: break-all; max-width: 500px;
  }
  #copy-status { color: #6fcf97; font-size: 13px; margin-top: 6px; height: 16px; }
</style>
</head>
<body>

<div id="setup">
  <h2>⚡ Simple Reaction Time</h2>
  <p id="instructions">
    Click the red box. Wait for it to turn <b>green</b>, then click as fast as
    you can. Clicking too early restarts that trial. You'll do 6 trials — the
    first is a warmup and isn't counted in your score.
  </p>
  <button id="start-btn">Start Task</button>
</div>

<div id="game" style="display:none;">
  <div id="progress"></div>
  <div id="stage" class="idle">Click to begin</div>
</div>

<div id="results" style="display:none;"></div>

<script>
// ---- Pure logic (validated with Node before embedding here) ----
function computeStats(rtArrayMs, warmupTrials) {
  const valid = rtArrayMs.slice(warmupTrials).filter(v => typeof v === "number" && !isNaN(v) && v > 0);
  if (valid.length === 0) return { mean: null, median: null, sd: null, min: null, max: null, n: 0 };
  const sorted = [...valid].sort((a, b) => a - b);
  const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
  const mid = Math.floor(sorted.length / 2);
  const median = sorted.length % 2 === 0 ? (sorted[mid - 1] + sorted[mid]) / 2 : sorted[mid];
  const variance = valid.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / valid.length;
  return {
    mean: Math.round(mean), median: Math.round(median), sd: Math.round(Math.sqrt(variance)),
    min: Math.round(sorted[0]), max: Math.round(sorted[sorted.length - 1]), n: valid.length,
  };
}
function isFalseStart(rtMs) { return typeof rtMs === "number" && rtMs < 100; }

// ---- Game state & loop ----
const TOTAL_TRIALS = 6;
const WARMUP_TRIALS = 1;
let trialIndex, rts, waitTimeout, stimulusShownAt, state;

document.getElementById("start-btn").onclick = () => {
  trialIndex = 0;
  rts = [];
  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "flex";
  document.getElementById("game").style.flexDirection = "column";
  document.getElementById("game").style.alignItems = "center";
  runTrial();
};

function runTrial() {
  if (trialIndex >= TOTAL_TRIALS) { endGame(); return; }
  document.getElementById("progress").textContent = `Trial ${trialIndex + 1} / ${TOTAL_TRIALS}`;
  const stage = document.getElementById("stage");
  stage.className = "waiting";
  stage.textContent = "Wait for green...";
  state = "waiting";

  const delay = 1500 + Math.random() * 2500; // 1.5-4s random delay
  waitTimeout = setTimeout(() => {
    stage.className = "ready";
    stage.textContent = "CLICK NOW";
    stimulusShownAt = performance.now();
    state = "ready";
  }, delay);
}

document.getElementById("game").addEventListener("click", (e) => {
  if (!e.target.matches("#stage")) return;
  const stage = document.getElementById("stage");

  if (state === "waiting") {
    // False start: clicked before green appeared
    clearTimeout(waitTimeout);
    stage.className = "idle";
    stage.textContent = "Too early! Restarting trial...";
    setTimeout(runTrial, 1000);
    return;
  }

  if (state === "ready") {
    const rt = performance.now() - stimulusShownAt;
    rts.push(rt);
    stage.className = "idle";
    stage.textContent = `${Math.round(rt)} ms`;
    state = "done";
    trialIndex++;
    setTimeout(runTrial, 900);
  }
});

function endGame() {
  document.getElementById("game").style.display = "none";
  const stats = computeStats(rts, WARMUP_TRIALS);
  const now = new Date().toISOString().slice(0, 16).replace("T", " ");
  const logLine = `${now} | Reaction Time | Mean: ${stats.mean}ms | Median: ${stats.median}ms | SD: ${stats.sd}ms | Trials: ${stats.n}`;

  document.getElementById("results").style.display = "block";
  document.getElementById("results").innerHTML = `
    <h2>Results</h2>
    <div class="metric"><div class="metric-value">${stats.mean}</div><div class="metric-label">Mean RT (ms)</div></div>
    <div class="metric"><div class="metric-value">${stats.median}</div><div class="metric-label">Median RT (ms)</div></div>
    <div class="metric"><div class="metric-value">${stats.sd}</div><div class="metric-label">SD (ms)</div></div>
    <p style="color:#999; font-size:13px; margin-top:16px;">Copy this line and paste it into the "Log a result" box in the app to track it on your progress dashboard:</p>
    <div id="copy-box">${logLine}</div>
    <button id="copy-btn" style="margin-top:10px;">Copy to Clipboard</button>
    <div id="copy-status"></div>
    <button id="retry-btn" style="margin-top:16px; background:#333;">Try Again</button>
  `;

  document.getElementById("copy-btn").onclick = () => {
    navigator.clipboard.writeText(logLine).then(() => {
      document.getElementById("copy-status").textContent = "Copied!";
    }).catch(() => {
      document.getElementById("copy-status").textContent = "Copy failed — select the text above manually.";
    });
  };
  document.getElementById("retry-btn").onclick = () => {
    document.getElementById("results").style.display = "none";
    document.getElementById("setup").style.display = "block";
  };
}
</script>
</body>
</html>
